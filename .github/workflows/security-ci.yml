name: security-ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write

jobs:
  repo-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository guardrails
        run: |
          chmod +x security/policy/enforce-repo-guardrails.sh
          ./security/policy/enforce-repo-guardrails.sh

  repo-guardrails-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository guardrails (PowerShell)
        shell: pwsh
        run: |
          ./security/policy/enforce-repo-guardrails.ps1

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: security/policy/semgrep-rules.yml

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    needs: repo-guardrails
    strategy:
      fail-fast: false
      matrix:
        project:
          - haclathon/server
          - haclathon/client
          - securepay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Runtime dependency audit
        working-directory: ${{ matrix.project }}
        run: npm audit --omit=dev --audit-level=high
